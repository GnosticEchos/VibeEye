# cargo-crap configuration
# See: https://github.com/cargo-crap/cargo-crap

# Global CRAP threshold. Functions with CRAP > threshold are flagged.
# The 4 functions currently above 30:
#   - help_tree::process_one_arg (CRAP 272, CC=16) — CLI flag parser, refactored once already
#   - engine::run_engine (CRAP 56, CC=7) — main Servo event-loop orchestrator
#   - engine::handle_command (CRAP 42, CC=6) — command dispatch match
#   - help_tree::collect_subcommands (CRAP 42, CC=6) — recursive JSON generation
# Setting threshold = 60 suppresses the 3 engine/help_tree functions while still
# flagging process_one_arg as a known hotspot worth monitoring.
threshold = 60

# Suppress test files from output (they are still analyzed).
exclude = ["**/tests/**"]
allow = [
    "**/tests/**",
    "**/benches/**",
]

# Pessimistic: functions without coverage data get penalised (2× CC).
missing = "pessimistic"
